<!DOCTYPE html>
<html lang="ko">
<head>
    <script src="./js/head-common.js"></script>
    <script src="./js/header.js"></script>
    
    <!-- swiper js -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"/>
    
    
    <link rel="stylesheet" href="./style/list.css">
    <script src="./js/listArray.js"></script>
    <script src="./js/listControl.js"></script>
    <script src="./js/include.js"></script>
    <script src="./js/heart.js"></script>
    <script src="./js/toWon.js"></script>
    <script src="./js/getParam.js"></script>
</head>
<body>
    <div id="include-header"></div>

    <!-- 전체 컨텐츠 -->
    <main>
        <!-- 서브 배너 -->
         <div class="sub-banner">
            <div class="common-frame">
                <h1>Drink Menu</h1>
            </div>
         </div>

         <!-- 타이틀 -->
          <div class="title">
            <div class="common-frame">
                <h3>Le bonheur Coffee</h3>
                <p>하루에 스며드는, 부드러운 한 잔의 여유</p>
            </div>
          </div>

          <!-- 옵션 -->
           <div class="option">
                <div class="common-frame">
                    <div class="total-view">
                        <span>TOTAL </span>
                        <span id="current-count" class="fwb">8</span>
                    </div>
                    <div>
                        <select id="view-filter" class="b2">
                            <option value="">정렬방식</option>
                            <option value="">낮은 가격 순</option>
                            <option value="">높은 가격 순</option>
                            <option value="">신상품</option>
                        </select>
                    </div>
                </div>
           </div>

           <!-- 상품 리스트 -->
            <div class="list-wrap">
                <div class="common-frame">
                    <ul class="list-grid">
                        <li>
                            <a href="./detail.html">
                                <figure>
                                    <img src="./img/signature1.jpg" alt="블랜드 커피">
                                </figure>
                                <div class="list-option">
                                    <span class="btn-heart">
                                        <img src="./img/heart.svg" alt="하트">
                                    </span>
                                </div>
                                <h4>Bonheur blend Coffee</h4>
                                <p class="fwm">부드러운 산미와 은은한 단맛이 조화를
                                이루는 대표 블렌드 커피</p>
                                <div class="price fwb">4.500</div>
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
    </main>

    <div id="include-footer"></div>
</body>
</html>
